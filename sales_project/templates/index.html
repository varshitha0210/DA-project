<!DOCTYPE html>
<html>
<head>
    <title>Sales Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

<h2 class="text-center">📊 Sales Analytics Dashboard</h2>

<div class="card p-3 bg-secondary">

<form action="/add" method="post" class="row g-2">
    <input class="form-control col" type="date" name="date" required>
    <input class="form-control col" type="text" name="item" placeholder="Item" required>
    <input class="form-control col" type="number" name="price" placeholder="Price" required>
    <input class="form-control col" type="number" name="quantity" placeholder="Quantity" required>
    <input class="form-control col" type="text" name="day" placeholder="Day">
    <input class="form-control col" type="text" name="weekend" placeholder="Weekend">
    <button class="btn btn-success col-12">Add Data</button>
</form>

</div>

<br>

<div class="d-flex flex-wrap gap-2 justify-content-center">
    <a href="/normalize" class="btn btn-info">Normalize</a>
    <a href="/anomaly" class="btn btn-warning">Anomaly</a>
    <a href="/elasticity" class="btn btn-primary">Elasticity</a>
    <a href="/moving" class="btn btn-secondary">Moving Avg</a>
    <a href="/forecast" class="btn btn-success">Forecast</a>
    <a href="/apriori" class="btn btn-danger">Apriori</a>
    <a href="/prefixspan" class="btn btn-light">PrefixSpan</a>
    <a href="/plot" class="btn btn-dark">Plot</a>
</div>

<br>

<h4>📋 Data Table</h4>
{% for table in tables %}
    {{ table|safe }}
{% endfor %}

<br>

<h4>📈 Graph</h4>
<img src="/static/plot.png" class="img-fluid">

</div>

</body>
</html>
